# platform.lock — THE reproducibility anchor (AOSP `repo manifest -r` / west / vcstool
# --exact / Nix flake.lock model). Every source repo pinned at an EXACT SHA. `pf build`
# resolves a profile's `ref` THROUGH this file to a SHA and builds the SHA, NEVER a
# branch tip (the Yocto AUTOREV / floating-branch reproducibility trap). `pf lock`
# freezes the current checkouts into this file.
#
# SEEDING (bead tsp-1dl.1.1) — two-stage, run via `pf lock`:
#   • INTERIM (seeded=false, interim_seed=true): SHAs = tips of the declared refs at seed
#     time. DEV-ONLY / non-authoritative — dev builds resolve real SHAs; RELEASE builds are
#     refused. Permitted now (owner decision 2026-07-01) to unblock B4 (tsp-1dl.4). Re-runs
#     re-pin to current tips, so the pinned SHAs may move until the authoritative seed.
#   • AUTHORITATIVE (seeded=true): the release lock. Only valid AFTER A1 + the B2 (tsp-1dl.2)
#     hardware retest land — BOTH move the kernel SHAs; seeding before then pins phantom refs.
#   `pf lock` (preview) → `pf lock --interim` (now) → `pf lock --authoritative --i-know-b2-is-done` (post-B2).
#
# TOPOLOGY (B2/tsp-1dl.2, owner-approved 2026-06-25) — kernel SPLIT per (family, line);
# GPU stays PER-IP; bootchain consolidation DROPPED (repos kept separate):
#   kernel-tsp        -> kernel-sunxi-4.9   (branch device/a133; 4.9.191, upstream-EOL)
#   kernel-tsp-a523   -> kernel-sunxi-5.15  (branch device/a523; full owned line + `upstream` base)
#   gpu-km-tsp / gpu-km-tsp-a523            -> UNCHANGED, per-IP (PowerVR != Mali, share no code)
#   u-boot-tsp-a523 + tfa-tsp-a523          -> KEPT SEPARATE (bootchain-sunxi consolidation DROPPED; see infra-025)
# Rationale: 4.9 and 5.15 share ~zero objects, never merge, want independent rulesets; split gives
# cleaner isolation than one kernel-sunxi over two unrelated bases (named fallback, owner's call).
# B3 (tsp-1dl.3) pins the vendor-manifest commit SHA here so the group->CID map can't float.

lockfile_version = 1
seeded           = false
interim_seed     = true

# Trust root (infra-016 §C; B3/tsp-1dl.3). Pins the release pubkey INTO the reproducibility
# anchor so gate-1 (the vendor-manifest signature) can't float independently of the source
# SHAs. This IS the org release anchor (infra-060, minisign fingerprint C958F0F49AE8C528),
# content-pinned by its key line. `manifest_signing_active = false`: manifest.toml is NOT yet
# signed with it — vendor-manifest must be onboarded as a `sign` GitHub Environment repo
# (infra-060 §12; tracked by tsp-dnw). Until then gate-1 is INERT and SHA-256 (gate 3, in
# fetch-group.py + carv2-verify.sh) is the only load-bearing integrity check.
[trust]
release_pub_fingerprint = "C958F0F49AE8C528"
release_pub_key         = "RWQoxeia9PBYyeMA93KCQALv/JTDLQGFVM7VDzjGcdidk5nhUP+3iJnk"
release_pub_source      = "github.com/pocketforge-os/infra/trust/minisign.pub"
manifest_signing_active = false

