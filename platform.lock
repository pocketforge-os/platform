# Vendor-originals CARv2 pin (B3 / tsp-1dl.3). The hermetic FETCH stage (image/build/Dockerfile.pf)
# dag-imports THIS .car and fetches each blob --offline. sha256 is ROT-DETECTION on the specific copy
# the build consumes — NOT a reproducibility gate (kubo emits CARv1; the .car is not byte-reproducible).
# The reproducibility ANCHOR is the per-blob CID+sha256 in the vendor-manifest, re-verified in-stage by
# fetch-group.py. Pinned so a build fetches a known-good .car copy.
[car]
sha256          = "ee4dee45ca46a1d494fbedff1fbd4a99469282e8e5078708f4491c07c28d16e2"
file_count      = 68
manifest_sha256 = "d36c32c6d5c04612ba2e3e9f2a5178aa6551511692f746f91c9bb85d3d8f3f8d"
