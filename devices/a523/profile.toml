# platform/devices/a523/profile.toml — TrimUI Smart Pro S (Allwinner A523 / sun55iw3)
#
# Declarative device profile. NO build logic here — logic lives in core/ (SoC-agnostic)
# and families/sunxi/ (the family plugin). The family plugin supplies defaults for any
# key this file omits (merge order: core defaults < families/sunxi/family.toml < this).
#
# TOPOLOGY (B2/tsp-1dl.2, owner-approved): kernel is SPLIT per (family, kernel-line) —
# A523's 5.15 line lives in kernel-sunxi-5.15 (branch device/a523), separate from the
# A133 4.9 line (kernel-sunxi-4.9). GPU stays PER-IP (Mali != PowerVR). Bootchain is the
# one bootchain-sunxi repo (A523 = branch device/a523; A133 boots a vendor blob group).
# platform.lock SHA-seeding is still deferred to tsp-1dl.1.1.

[device]
id           = "a523"
name         = "TrimUI Smart Pro S"
soc          = "sun55iw3"
soc_friendly = "Allwinner A523 (TG5050)"
arch         = "aarch64"
family       = "sunxi"                       # selects families/sunxi/

[kernel]
repo       = "kernel-sunxi-5.15"             # split-per-(family,line); owner B2 decision (tsp-1dl.2)
ref        = "device/a523"                   # full owned line: AvaotaSBC import base + 12 owned commits
                                             #   (incl. tsp-vuo.8 DSI C-code); `upstream` branch = the
                                             #   AvaotaSBC base for `git am`-onto-GregKH-tag fork-tracking
defconfig  = "pocketforge_a523_defconfig"
dtb        = "sun55i-t527-tg5050.dtb"
dts_source = "vendor-rebuilt"                # a523 still on a bring-up crutch DTB (tsp-vuo)

[gpu]
repo    = "gpu-km-tsp-a523"                  # GPU stays PER-IP (Mali-G57 != PowerVR; share zero code)
ref     = "master"
modules = ["mali_kbase.ko"]                  # Mali-G57; userspace libmali is a blob group
                                             # (obsoleted if tsp-mo2 Panfrost lands)

[toolchain]
# Shared gcc-10.3-2021.07 builds BOTH lines (A523 already uses the same pocketforge/build
# container). cflags_extra captures that 10.3 is NOT pristine for 5.15: the A523 build
# needs -fcommon (GCC 10 -fno-common default breaks vendor tentative-definitions) and
# -Wno-error (vendor BSP warnings). Soft signal toward a per-line toolchain bump later (B2).
cc           = "aarch64-none-linux-gnu-"
gcc_version  = "10.3-2021.07"
cflags_extra = "-Wno-error -fcommon"

[bootchain]
model         = "sunxi-spl-uboot"            # owned U-Boot SPL + TF-A BL31 (source-built)
boot_proto    = "extlinux"
# DECIDED topology (B2): consolidate into one `bootchain-sunxi` repo (branch device/a523).
# DEFERRED: u-boot + TF-A are unrelated histories needing a subdir/branch layout decision —
# a separate import, NOT in B2's kernel-focused safe groundwork. Refs stay on the real repos
# until that import lands (avoids a phantom ref); platform.lock seeding is deferred anyway.
uboot.repo    = "u-boot-tsp-a523"            # -> bootchain-sunxi (device/a523) when consolidated
uboot.ref     = "pf-main"
uboot.defconfig = "tg5050_defconfig"
tfa.repo      = "tfa-tsp-a523"               # -> bootchain-sunxi when consolidated
tfa.ref       = "main"
tfa.plat      = "sun55i_a523"
spl_offset_kib = 8

[image]
partition_table = "mbr"
assembler       = "family-script"            # families/sunxi/assemble-image.sh (boards/tsp-s/assemble-sd.sh)
boot_fs         = "vfat"
boot_label      = "POCKETFORGE"
root_fs         = "ext4"
root_label      = "POCKETFORGE_DATA"
image_name      = "pocketforge-tsp-s"
fs_uuids_file   = "boards/tsp-s/fs-uuids.env"  # USERDATA_FS_UUID / HASH_SEED / DISK_UUID (repro anchors)

[console]
dev          = "ttyAS0"
baud         = 115200
earlycon     = "uart8250,mmio32,0x02500000"
cmdline_extra = "loglevel=8 rootwait"

[blobs]
groups = ["sunxi-a523-mali", "sunxi-a523-wifi-firmware"]   # names -> vendor-manifest groups

[container]
build_image = "pocketforge/build:10.3-2021.07-bookworm"    # @sha256:<digest> seeded in tsp-1dl.1.1
app_base    = "pocketforge/oci-base-aarch64"               # @sha256:<digest> (B5)

[flash]
method = "dd-sd"
slot   = "pros"                              # Dell two-LUN reader (tsp-device-access)
