# platform/devices/a523/capabilities.toml — TrimUI Smart Pro S (Allwinner A523 / TG5050).
#
# Capability descriptor SIBLING to profile.toml (joined by device.id). Validate:
# `pf caps validate a523`. Authored from hardware-firmware-probes.md §17 + the companion
# trimui-smartpro-s-a523-platform-report.md + the shared chassis (FCC 2BD9O-TG5050).
#
# THE MULTI-DEVICE PROOF: this descriptor is the a133 one PLUS data rows — same schema,
# zero per-device CODE. The added rows are: home, l3, r3 (inputs); imu (sensor); rumble
# (actuator). The LED actuator DIFFERS (different controller IC: ledc vs the A133's
# sunxi_led) — a genuine hardware difference expressed as DATA, still no code branch.
#
# INVARIANTS (as a133): descriptor = EXPECTATION; probe = GROUND TRUTH (SPIKE-0 / tsp-9sx.1).
# Both units share ONE Xbox-360 HID (045e:028e); the SPIKE-0 fidelity check is asymmetric.
# SPIKE-0 HAZARDS on this unit (R3): several A523 sensors are DT-but-UNBOUND — only the
# IMU (qmi8658) is claimed here; the magnetometer (mmc5603) and GNSS are OMITTED until
# SPIKE-0 proves they actually BIND. The Home key code/device is a SPIKE-0 confirm (see below).

# Default "confirm" face button (Xbox/PS = south). HINT only; full action mapping is E2's.
accept_default = "south"

[identity]
id           = "a523"
manufacturer = "TrimUI"
model        = "Smart Pro S"
codename     = "5050"                                # Android-picker leaf: TrimUI > 5050 (Pro S)
sdl_guid     = "030000005e0400008e02000010010000"   # same Xbox-360 gamepad identity as the base (§17)
match        = { evdev_name = "TRIMUI Player1", vid = "045e", pid = "028e" }

# Same chassis + panel as the base. Render INTENT is identical (app draws landscape 1280x720,
# present portrait). The rotation MECHANISM differs per-SoC (A523 = sunxi DRM/KMS, not the
# A133's legacy disp2) but that is CODE, not descriptor data — the logical enum is the same.
[[screens]]
role          = "primary"
present       = "portrait"
rotation      = "cw90"
render_canvas = { w = 1280, h = 720 }
display_rect  = { x = 304, y = 75, w = 872, h = 490 }

# ---- INPUTS: the a133 set, verbatim (POSITIONAL face ids + label; see the a133 note) ----
# Face labels are NINTENDO-arranged on the chassis (SPIKE-0 press-test on silicon, 2026-07-11:
# pressing chassis-labeled A fired BTN_B/east, B->BTN_A/south, X->BTN_Y/north, Y->BTN_X/west).
[[inputs]]
id = "south"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_A"
label = "B"
skin_part = "btn_south"
[[inputs]]
id = "east"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_B"
label = "A"
skin_part = "btn_east"
[[inputs]]
id = "west"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_X"
label = "Y"
skin_part = "btn_west"
[[inputs]]
id = "north"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_Y"
label = "X"
skin_part = "btn_north"
[[inputs]]
id = "select"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_SELECT"
skin_part = "btn_select"
[[inputs]]
id = "guide"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_MODE"
skin_part = "btn_guide"
[[inputs]]
id = "start"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_START"
skin_part = "btn_start"
[[inputs]]
id = "l1"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_TL"
skin_part = "btn_l1"
[[inputs]]
id = "r1"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_TR"
skin_part = "btn_r1"
[[inputs]]
id = "dpad"
kind = "hat"
ev_type = "EV_ABS"
code = "ABS_HAT0X,ABS_HAT0Y"
skin_part = "dpad"
[[inputs]]
id = "lstick"
kind = "stick"
ev_type = "EV_ABS"
code = "ABS_X,ABS_Y"
skin_part = "stick_l"
x = { min = -32767, max = 32767, fuzz = 0, flat = 0 }
y = { min = -32767, max = 32767, fuzz = 0, flat = 0 }
[[inputs]]
id = "rstick"
kind = "stick"
ev_type = "EV_ABS"
code = "ABS_RX,ABS_RY"
skin_part = "stick_r"
x = { min = -32767, max = 32767, fuzz = 0, flat = 0 }
y = { min = -32767, max = 32767, fuzz = 0, flat = 0 }
# L2/R2 — a BINARY ACTUATOR reported on ANALOG wire channels (owner ground truth, unit
# surgery: a digital switch, "just a button pusher, no travel"). The silicon emits the
# Xbox-360 TRIGGER AXES: SPIKE-0 press-test (2026-07-11, stock 5.15.147) shows ONLY
# endpoint values — full-swing ABS_Z/ABS_RZ 0<->255 per pull, zero intermediates (the
# owner's accidental L2 graze emitted a full 255: switch-with-no-proportional-range) —
# and the pad advertises NO BTN_TL2/BTN_TR2 (EVIOCGBIT). tsp-5p1's "kernel emits
# BTN_TL2/TR2" claim is REFUTED. `kind`/`ev_type`/`code`/`range` model the WIRE (what a
# raw consumer sees); the `semantics = "binary"` field (tsp-v19s) carries the actuator
# truth for the three consumers — E2 broker may present as a digital input, E5 sim
# synthesizes endpoint-only values, CI asserts endpoint-only. SDL emit unchanged:
# lefttrigger/righttrigger axes (a2/a5) — the SDL wire mapping stays the wire mapping.
[[inputs]]
id = "ltrig"
kind = "trigger"
ev_type = "EV_ABS"
code = "ABS_Z"
semantics = "binary"
range = { min = 0, max = 255, fuzz = 0, flat = 0 }
skin_part = "trig_l"
[[inputs]]
id = "rtrig"
kind = "trigger"
ev_type = "EV_ABS"
code = "ABS_RZ"
semantics = "binary"
range = { min = 0, max = 255, fuzz = 0, flat = 0 }
skin_part = "trig_r"

# ---- ... PLUS the Pro S-only PURE ADDED ROWS ----
# Home: a dedicated system button physically NEXT TO POWER — a system key, NOT the gamepad's
# guide (BTN_MODE, already mapped above). ADJUDICATED on silicon (SPIKE-0 press-test,
# 2026-07-11, stock 5.15.147): the press fires KEY_HOMEPAGE (172) on the sunxi-keyboard
# LRADC node (event0), confirming the KEY_HOMEPAGE authoring over the kickoff's BTN_MODE.
[[inputs]]
id = "home"
kind = "button"
ev_type = "EV_KEY"
code = "KEY_HOMEPAGE"
skin_part = "btn_home"
# Clickable thumbsticks (L3/R3) — the press of the existing sticks (lights the stick part).
[[inputs]]
id = "l3"
kind = "stick-click"
ev_type = "EV_KEY"
code = "BTN_THUMBL"
skin_part = "stick_l"
[[inputs]]
id = "r3"
kind = "stick-click"
ev_type = "EV_KEY"
code = "BTN_THUMBR"
skin_part = "stick_r"

# ---- SENSORS (Pro S-only) ----
# NO [[sensors]] rows: SPIKE-0 adjudicated (2026-07-11, two independent on-silicon checks —
# tsp-e1b.8's exerciser + tsp-9sx.1's bind transcript) that on the operative stock kernel
# /sys/bus/iio is EMPTY: qmi8658 (imu, i2c 1-006b, driver=UNBOUND) and mmc5603 (mag) are
# DT-present but driver-UNBOUND, and GNSS shows no bound driver. Per the R3 rule (missing
# hardware = ROW OMISSION, never a fabricated row) the imu row is OMITTED until an owned
# A523 kernel binds the qmi8658 IIO driver; the mount_matrix is unmeasured until then.

# ---- ACTUATORS ----
# Rumble (Pro S-only) — single pwm-vibrator motor (§17).
[[actuators]]
id = "rumble"
kind = "rumble"
ev_type = "EV_FF"
code = "FF_RUMBLE"
sysfs = "pwm-vibrator"
# LEDs — DIFFERENT controller IC than the base (ledc/led_anim vs sunxi_led); ~17 LEDs.
# A real hardware difference carried as DATA (count + controller), not a code branch.
[[actuators]]
id = "leds"
kind = "led_array"
controller = "ledc"
count = 17

