# platform/devices/a133/profile.toml — TrimUI Smart Pro (Allwinner A133 / sun50iw10)
#
# See devices/a523/profile.toml header for the merge model + M-1 repo-naming note.
# The A133 captures the divergence already in the tree: it currently boots VENDOR
# boot0 + dragonsecboot boot_package.fex + abootimg boot.img, so its [bootchain]
# is (for now) a BLOB GROUP, not a source repo — the schema expresses either,
# which is what makes the A133-vs-A523 split declarative.
# NB (2026-07-16, tsp-1dl.9): the old "no mainline U-Boot for sun50iw10" framing
# is OUTDATED — PocketForge now owns A133 bootchain forks u-boot-tsp-a133 (mainline
# sun50iw10 SPL + TG5040 board, FEL-cooperative; tsp-bcx.30.1) and tfa-tsp-a133.
# This [bootchain] stays blob-group until those are wired into platform.lock
# (tsp-147u.13 / tsp-bcx.30); this comment fix does NOT change the config.

[device]
id           = "a133"
name         = "TrimUI Smart Pro"
soc          = "sun50iw10p1"
soc_friendly = "Allwinner A133 (TG5040)"
arch         = "aarch64"
family       = "sunxi"

[kernel]
repo       = "kernel-sunxi-4.9"               # split-per-(family,line); owner B2 decision (tsp-1dl.2)
ref        = "device/a133"                    # 4.9.191; upstream-EOL (no `upstream` branch; root = vendor-import pin)
defconfig  = "pocketforge_tsp_defconfig"
dtb        = "pocketforge_tsp.dtb"
dts_source = "owned"

[gpu]
repo    = "gpu-km-tsp"                        # GPU stays PER-IP (PowerVR != Mali; share zero code) — NOT collapsed
ref     = "main"
modules = ["pvrsrvkm.ko", "dc_sunxi.ko"]     # PowerVR DDK 1.19; UM .so is a preserved blob group

[toolchain]
# Explicit pin (B2/tsp-1dl.2). Family default (families/sunxi/family.toml) builds the
# 4.9 line cleanly; restated here so the profile is self-contained for `pf lock`/repro.
cc          = "aarch64-none-linux-gnu-"
gcc_version = "10.3-2021.07"

[bootchain]
model      = "sunxi-boot0-fex"               # vendor boot0 + boot_package.fex (owned u-boot-tsp-a133/tfa-tsp-a133 exist but not yet wired here)
boot_proto = "boot_package_fex"
blob_group = "sunxi-a133-boot-chain"         # boot0.img / monitor.bin(BL31) / scp.bin / u-boot.bin
# NB: no uboot.repo/tfa.repo here yet -> build_bootchain is pass-through-the-blob-group for a133.
# The owned forks (u-boot-tsp-a133 / tfa-tsp-a133) supersede the "no mainline U-Boot"
# assumption; wiring uboot.repo/tfa.repo + platform.lock is tsp-147u.13 / tsp-bcx.30, not this edit.

[image]
partition_table = "gpt"
assembler       = "genimage"                 # boards/tsp/genimage.cfg
boot_fs         = "vfat"
boot_label      = "POCKETFORGE"
root_fs         = "ext4"
root_label      = "POCKETFORGE_DATA"
image_name      = "pocketforge-tsp"
fs_uuids_file   = "boards/tsp/fs-uuids.env"

[console]
dev          = "ttyS0"                        # A133 dev access via the Dell ESP32 bridge /dev/tsp-console
baud         = 115200
earlycon     = "uart8250,mmio32,0x05000000"
cmdline_extra = "loglevel=8 rootwait"

[blobs]
groups = ["pvr-ddk-22.102.54.38", "sunxi-a133-boot-chain", "sunxi-a133-wifi-firmware"]

[container]
build_image = "pocketforge/build:10.3-2021.07-bookworm"
app_base    = "pocketforge/oci-base-aarch64"

[flash]
method = "dd-sd"
slot   = "base"
